<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algorithm Vault — Download</title>
    <link rel="icon" type="image/png" href="../../page_icon.png">
  <link rel="shortcut icon" href="../../page_icon.png">
  <link rel="apple-touch-icon" href="../../page_icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #080c12;
  --surface:  #0e1420;
  --glass:    rgba(255,255,255,0.04);
  --border:   rgba(255,255,255,0.08);
  --accent:   #00e5c3;
  --accent2:  #6c63ff;
  --txt:      #e2e8f0;
  --txt-muted:#6b7ea0;
  --card-glow:rgba(0,229,195,0.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--txt);
  font-family:'Figtree',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,229,195,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,195,0.03) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0;
}
#app{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:3rem 1.5rem 5rem;}

/* Orbs */
.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;}
.orb-1{width:400px;height:400px;background:rgba(0,229,195,0.09);top:-80px;left:-100px;}
.orb-2{width:320px;height:320px;background:rgba(108,99,255,0.08);bottom:0;right:-80px;}

/* Nav */
nav{
  position:sticky;top:0;z-index:50;
  background:rgba(8,12,18,0.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0.9rem 1.5rem;
  display:flex;align-items:center;gap:10px;
  font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--txt-muted);
}
.nav-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}

/* Section label */
.section-label{
  font-family:'DM Mono',monospace;font-size:0.68rem;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--accent);margin-bottom:0.5rem;display:block;
}

/* App header */
.app-header{display:flex;align-items:center;gap:1.25rem;margin-bottom:2rem;}
.app-icon{
  width:80px;height:80px;border-radius:20px;
  border:1px solid rgba(0,229,195,0.2);object-fit:cover;flex-shrink:0;
  background:var(--surface);
}
.app-icon-fb{
  width:80px;height:80px;border-radius:20px;
  border:1px solid rgba(0,229,195,0.2);
  background:linear-gradient(135deg,rgba(0,229,195,0.15),rgba(108,99,255,0.15));
  display:none;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:1.6rem;color:var(--accent);flex-shrink:0;
}
.app-name{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:700;color:var(--txt);}
.app-dev{font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--txt-muted);margin-top:3px;}
.app-desc{color:var(--txt-muted);font-size:0.9rem;line-height:1.7;margin-top:6px;}

/* Banner */
.banner-wrap{margin-bottom:2rem;}
.app-banner{
  width:100%;border-radius:16px;border:1px solid var(--border);
  object-fit:cover;max-height:250px;display:block;background:var(--surface);
}
.app-banner-fb{
  width:100%;border-radius:16px;border:1px solid var(--border);
  height:140px;
  background:linear-gradient(135deg,rgba(0,229,195,0.05),rgba(108,99,255,0.05));
  display:none;align-items:center;justify-content:center;
}
.banner-icon{font-size:3rem;opacity:0.2;}

/* Latest release card */
.latest-card{
  background:rgba(0,229,195,0.03);
  border:1px solid rgba(0,229,195,0.18);
  border-radius:20px;padding:1.75rem;margin-bottom:2.5rem;
  position:relative;overflow:hidden;
}
.latest-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 10% 20%,rgba(0,229,195,0.06) 0%,transparent 55%);
  pointer-events:none;
}
.latest-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap;}
.latest-version{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;color:var(--txt);}
.latest-name{font-size:0.82rem;color:var(--txt-muted);margin-top:3px;}
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 11px;border-radius:999px;
  font-size:0.67rem;font-family:'DM Mono',monospace;letter-spacing:0.05em;
  background:rgba(0,229,195,0.1);border:1px solid rgba(0,229,195,0.25);color:var(--accent);
  flex-shrink:0;
}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}
.badge-arch{
  background:rgba(108,99,255,0.1);border-color:rgba(108,99,255,0.25);color:#a5a0ff;
}

.meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem;}
.meta-item{
  background:rgba(255,255,255,0.03);border:1px solid var(--border);
  border-radius:10px;padding:0.7rem 0.9rem;
}
.meta-label{font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--txt-muted);margin-bottom:3px;}
.meta-val{font-size:0.85rem;color:var(--txt);font-weight:500;}

.changelog{
  background:rgba(255,255,255,0.02);border:1px solid var(--border);
  border-radius:12px;padding:1rem 1.1rem;margin-bottom:1.25rem;
}
.changelog-title{
  font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--accent);margin-bottom:0.7rem;
}
.cl-item{display:flex;align-items:flex-start;gap:8px;font-size:0.86rem;color:#94a3b8;padding:3px 0;}
.cl-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:8px;flex-shrink:0;opacity:0.6;}

.btn-row{display:flex;gap:10px;flex-wrap:wrap;}
.btn-dl{
  background:var(--accent);color:#080c12;font-weight:700;
  font-family:'Figtree',sans-serif;border:none;border-radius:12px;
  padding:13px 28px;cursor:pointer;font-size:0.95rem;
  display:flex;align-items:center;gap:8px;
  transition:opacity 0.2s,transform 0.15s;flex:1;justify-content:center;
}
.btn-dl:hover{opacity:0.88;transform:translateY(-1px);}
.btn-ghost{
  background:transparent;color:var(--txt-muted);
  border:1px solid var(--border);border-radius:12px;
  padding:12px 18px;cursor:pointer;
  font-family:'Figtree',sans-serif;font-size:0.875rem;
  display:flex;align-items:center;gap:7px;transition:all 0.2s;
}
.btn-ghost:hover{color:var(--txt);border-color:rgba(255,255,255,0.2);}

.notice{
  font-family:'DM Mono',monospace;font-size:0.68rem;
  color:var(--txt-muted);text-align:center;padding-top:0.85rem;
}

/* Older releases */
.releases-title{
  font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;
  color:var(--txt);margin-bottom:1rem;
}
.release-row{
  background:var(--glass);border:1px solid var(--border);
  border-radius:14px;padding:1.1rem 1.25rem;margin-bottom:10px;
  transition:border-color 0.2s,box-shadow 0.2s;cursor:default;
}
.release-row:hover{border-color:rgba(0,229,195,0.2);box-shadow:0 4px 20px rgba(0,229,195,0.04);}
.release-row-top{display:flex;align-items:center;justify-content:space-between;gap:0.75rem;flex-wrap:wrap;}
.release-row-left{display:flex;align-items:center;gap:10px;}
.release-ver{font-family:'DM Mono',monospace;font-size:0.9rem;color:var(--txt);font-weight:500;}
.release-date{font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--txt-muted);}
.release-row-actions{display:flex;gap:8px;align-items:center;}
.btn-dl-sm{
  background:rgba(0,229,195,0.1);border:1px solid rgba(0,229,195,0.25);
  color:var(--accent);border-radius:9px;padding:7px 14px;
  font-family:'Figtree',sans-serif;font-size:0.8rem;font-weight:600;
  cursor:pointer;display:flex;align-items:center;gap:5px;
  transition:background 0.2s;white-space:nowrap;
}
.btn-dl-sm:hover{background:rgba(0,229,195,0.18);}
.btn-gh-sm{
  background:transparent;border:1px solid var(--border);
  color:var(--txt-muted);border-radius:9px;padding:6px 11px;
  cursor:pointer;font-size:0.78rem;display:flex;align-items:center;gap:4px;
  transition:all 0.18s;
}
.btn-gh-sm:hover{color:var(--txt);border-color:rgba(255,255,255,0.2);}
.release-features{
  display:flex;flex-wrap:wrap;gap:5px;margin-top:0.75rem;
}
.feat-tag{
  font-family:'DM Mono',monospace;font-size:0.67rem;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:6px;padding:3px 9px;color:var(--txt-muted);
}
.divider{border:none;border-top:1px solid var(--border);margin:2rem 0;}

/* Animations */
.latest-card{animation:fadeUp 0.4s ease both;}
.release-row{animation:fadeUp 0.4s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.release-row:nth-child(1){animation-delay:0.05s;}
.release-row:nth-child(2){animation-delay:0.12s;}
.release-row:nth-child(3){animation-delay:0.19s;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<nav>
  <div class="nav-dot"></div>
  Algorithm Vault &nbsp;/&nbsp; Download
</nav>

<div id="app">
  <div style="margin-bottom:2rem;">
    <span class="section-label">Download</span>
    <div class="app-header">
      <img id="app-icon" class="app-icon"
        src="https://raw.githubusercontent.com/sakib-12345/AlgorithmVault/main/page_icon.png"
        alt="App icon"
        onerror="this.style.display='none';document.getElementById('app-icon-fb').style.display='flex'">
      <div id="app-icon-fb" class="app-icon-fb">AV</div>
      <div>
        <div class="app-name">Algorithm Vault</div>
        <div class="app-dev">by sakib-12345</div>
        <div class="app-desc">Algorithm learning platform with offline-first native experience.</div>
      </div>
    </div>
  </div>

  <div class="banner-wrap">
    <img id="app-banner" class="app-banner"
      src="https://raw.githubusercontent.com/sakib-12345/AlgorithmVault/main/Mobile/v2.0.0-review.png"
      alt="App preview"
      onerror="this.style.display='none';document.getElementById('app-banner-fb').style.display='flex'">
    <div id="app-banner-fb" class="app-banner-fb">
      <span class="banner-icon">📱</span>
    </div>
  </div>

  <!-- Latest release -->
  <span class="section-label">Latest Release</span>
  <div class="latest-card" id="latest-card"></div>

  <hr class="divider">

  <!-- Older releases -->
  <span class="section-label">All Releases</span>
  <div class="releases-title" id="releases-count"></div>
  <div id="older-releases"></div>

  <div class="notice" style="margin-top:2rem;">
    com.algorithmvault.app &nbsp;·&nbsp; Enable "Install unknown apps" to sideload APK
  </div>
</div>

<script>
const APP = {
  "app": {
    "name": "Algorithm Vault",
    "package": "com.algorithmvault.app",
    "developer": "sakib-12345",
    "description": "Algorithm learning platform with offline-first native experience."
  },
  "releases": [
    {
      "version": "v2.0.0","version_code": 200,
      "release_name": "Algorithm Vault v2.0.0",
      "type": "stable","architecture": "native","platform": "android","build": "release",
      "release_date": "2026-06-03","min_android": "Android 8.0+","size": "18.5 MB",
      "features": ["Complete native Android rewrite","Offline caching support","Dynamic algorithm sync","Modern Material 3 UI","Improved performance","Better navigation system"],
      "repo_url": "https://github.com/sakib-12345/AlgorithmVault",
      "release_url": "https://github.com/sakib-12345/AlgorithmVault/releases/tag/v2.0.0",
      "download_url": "https://github.com/sakib-12345/AlgorithmVault/releases/download/v2.0.0/algorithm-vault-v2.0.0.apk"
    },
    {
      "version": "v1.0.0","version_code": 100,
      "release_name": "Algorithm Vault Mobile v1.0.0",
      "type": "stable","architecture": "webview","platform": "android","build": "release",
      "release_date": "2026-05-31","min_android": "Android 7.0+","size": "11.4 MB",
      "features": ["WebView-based mobile app","Responsive website integration","Simple lightweight APK","Fast deployment","Basic mobile support"],
      "repo_url": "https://github.com/sakib-12345/AlgorithmVault",
      "release_url": "https://github.com/sakib-12345/AlgorithmVault/releases/tag/v1.0.0",
      "download_url": "https://github.com/sakib-12345/AlgorithmVault/releases/download/v1.0.0/algorithm-vault-v1.0.0.apk"
    }
  ]
};

function formatDate(d) {
  return new Date(d).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
}

function archBadge(arch) {
  return `<span class="badge badge-arch">${arch}</span>`;
}

function stableBadge(type) {
  return `<span class="badge"><span class="badge-dot"></span>${type}</span>`;
}

const releases = APP.releases;
const latest = releases[0];
const older = releases.slice(1);

// Render latest
document.getElementById('latest-card').innerHTML = `
  <div class="latest-top">
    <div>
      <div class="latest-version">${latest.version}</div>
      <div class="latest-name">${latest.release_name}</div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      ${stableBadge(latest.type)}
      ${archBadge(latest.architecture)}
    </div>
  </div>
  <div class="meta-grid">
    <div class="meta-item"><div class="meta-label">Released</div><div class="meta-val">${formatDate(latest.release_date)}</div></div>
    <div class="meta-item"><div class="meta-label">Size</div><div class="meta-val">${latest.size}</div></div>
    <div class="meta-item"><div class="meta-label">Requires</div><div class="meta-val">${latest.min_android}</div></div>
  </div>
  <div class="changelog">
    <div class="changelog-title">What's new</div>
    ${latest.features.map(f => `<div class="cl-item"><span class="cl-dot"></span>${f}</div>`).join('')}
  </div>
  <div class="btn-row">
    <button class="btn-dl" onclick="window.open('${latest.download_url}','_blank')">
      ↓ &nbsp;Download APK &nbsp;<span style="opacity:.6;font-weight:400;font-size:0.8rem;">${latest.size}</span>
    </button>
    <button class="btn-ghost" onclick="window.open('${latest.repo_url}','_blank')">GitHub ↗</button>
    <button class="btn-ghost" onclick="window.open('${latest.release_url}','_blank')">Release Notes</button>
  </div>
`;

// Render all releases list (all of them for the "All Releases" section)
document.getElementById('releases-count').textContent = `${releases.length} release${releases.length !== 1 ? 's' : ''} available`;

const olderEl = document.getElementById('older-releases');
olderEl.innerHTML = releases.map((r, i) => `
  <div class="release-row" style="animation-delay:${i * 0.07}s">
    <div class="release-row-top">
      <div class="release-row-left">
        <div class="release-ver">${r.version}</div>
        ${stableBadge(r.type)}
        ${archBadge(r.architecture)}
        ${i === 0 ? '<span class="badge" style="background:rgba(255,200,0,0.1);border-color:rgba(255,200,0,0.25);color:#fbbf24;">Latest</span>' : ''}
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <span class="release-date">${formatDate(r.release_date)} · ${r.size} · ${r.min_android}</span>
        <div class="release-row-actions">
          <button class="btn-dl-sm" onclick="window.open('${r.download_url}','_blank')">↓ APK</button>
          <button class="btn-gh-sm" onclick="window.open('${r.release_url}','_blank')">Notes ↗</button>
        </div>
      </div>
    </div>
    <div class="release-features">
      ${r.features.map(f => `<span class="feat-tag">${f}</span>`).join('')}
    </div>
  </div>
`).join('');
</script>
</body>
</html>
