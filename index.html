<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Algorithm Vault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;500;600;700;800&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    :root {
      --bg:       #080c12;
      --surface:  #0e1420;
      --glass:    rgba(255,255,255,0.04);
      --border:   rgba(255,255,255,0.08);
      --accent:   #00e5c3;
      --accent2:  #6c63ff;
      --txt:      #e2e8f0;
      --txt-muted:#6b7ea0;
      --card-glow:rgba(0,229,195,0.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--txt);
      font-family: 'Figtree', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,195,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,195,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Noise texture ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    #app { position: relative; z-index: 1; }

    /* ── Syne headings ── */
    .font-display { font-family: 'Syne', sans-serif; }
    .font-mono    { font-family: 'DM Mono', monospace; }

    /* ── Glassmorphism card ── */
    .glass {
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* ── Algorithm cards ── */
    .algo-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      cursor: pointer;
      transition: transform 0.22s cubic-bezier(.4,0,.2,1),
                  border-color 0.22s ease,
                  box-shadow 0.22s ease;
      position: relative;
      overflow: hidden;
    }
    .algo-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(0,229,195,0.07) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .algo-card:hover { transform: translateY(-4px); border-color: rgba(0,229,195,0.3); box-shadow: 0 8px 32px var(--card-glow); }
    .algo-card:hover::before { opacity: 1; }

    /* ── Accent pill / badge ── */
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.05em;
      background: rgba(0,229,195,0.1);
      border: 1px solid rgba(0,229,195,0.25);
      color: var(--accent);
    }

    /* ── Nav ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(8,12,18,0.82);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    /* ── Hero gradient orbs ── */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    .orb-1 { width: 420px; height: 420px; background: rgba(0,229,195,0.12); top: -100px; left: -80px; }
    .orb-2 { width: 360px; height: 360px; background: rgba(108,99,255,0.10); top: 40px; right: -60px; }

    /* ── Search modal ── */
    #search-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: 10vh;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    #search-overlay.open { opacity: 1; pointer-events: all; }

    #search-modal {
      width: min(600px, 92vw);
      background: #0e1420;
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,229,195,0.08);
      transform: translateY(-12px) scale(0.97);
      transition: transform 0.22s cubic-bezier(.4,0,.2,1);
    }
    #search-overlay.open #search-modal { transform: translateY(0) scale(1); }

    #search-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--txt);
      font-size: 1.1rem;
      font-family: 'Figtree', sans-serif;
      padding: 1.2rem 1.5rem;
    }
    #search-input::placeholder { color: var(--txt-muted); }

    .search-result-item {
      padding: 0.85rem 1.5rem;
      cursor: pointer;
      transition: background 0.15s ease;
      display: flex; align-items: center; gap: 12px;
      border-top: 1px solid var(--border);
    }
    .search-result-item:hover { background: rgba(0,229,195,0.06); }

    /* ── Tabs (language switcher) ── */
    .lang-tab {
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.78rem;
      font-family: 'DM Mono', monospace;
      cursor: pointer;
      color: var(--txt-muted);
      border: 1px solid transparent;
      transition: all 0.15s ease;
    }
    .lang-tab.active, .lang-tab:hover {
      color: var(--accent);
      background: rgba(0,229,195,0.08);
      border-color: rgba(0,229,195,0.2);
    }

    /* ── Code block ── */
    pre[class*="language-"] {
      background: #060a0f !important;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin: 0;
      padding: 1.5rem;
      overflow-x: auto;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      line-height: 1.7;
    }

    /* ── Markdown content ── */
    .md-content h1, .md-content h2, .md-content h3 { font-family: 'Syne', sans-serif; color: var(--txt); margin: 1.4em 0 0.6em; }
    .md-content h1 { font-size: 1.5rem; }
    .md-content h2 { font-size: 1.2rem; }
    .md-content h3 { font-size: 1rem; }
    .md-content p  { color: #94a3b8; line-height: 1.75; margin: 0.75em 0; }
    .md-content code { font-family: 'DM Mono', monospace; background: rgba(0,229,195,0.08); color: var(--accent); padding: 2px 6px; border-radius: 5px; font-size: 0.85em; }
    .md-content pre  { background: #060a0f; border: 1px solid var(--border); border-radius: 10px; padding: 1rem; overflow-x: auto; margin: 1em 0; }
    .md-content pre code { background: none; color: #94a3b8; }
    .md-content ul, .md-content ol { padding-left: 1.5rem; color: #94a3b8; line-height: 1.75; }
    .md-content li { margin: 0.3em 0; }
    .md-content strong { color: var(--txt); font-weight: 600; }
    .md-content a { color: var(--accent); text-decoration: underline; }
    .md-content blockquote { border-left: 3px solid var(--accent); padding: 0.5rem 1rem; background: rgba(0,229,195,0.04); border-radius: 0 8px 8px 0; margin: 1em 0; }
    .md-content hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }

    /* ── Page transitions ── */
    .page { animation: fadeIn 0.3s ease both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Stagger cards ── */
    .algo-card { animation: cardIn 0.4s ease both; }
    @keyframes cardIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Complexity pill ── */
    .complexity-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.4rem;
    }

    /* ── Scroll bar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    /* ── Button ── */
    .btn-primary {
      background: var(--accent);
      color: #080c12;
      font-weight: 600;
      font-family: 'Figtree', sans-serif;
      border: none;
      border-radius: 10px;
      padding: 10px 22px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      font-size: 0.9rem;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }

    .btn-ghost {
      background: transparent;
      color: var(--txt-muted);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 20px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Figtree', sans-serif;
      font-size: 0.9rem;
    }
    .btn-ghost:hover { color: var(--txt); border-color: rgba(255,255,255,0.2); }

    /* ── Kbd shortcut ── */
    kbd {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 2px 7px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 5px;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--txt-muted);
    }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* Mobile tweaks */
    @media (max-width: 640px) {
      .orb-1, .orb-2 { width: 220px; height: 220px; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ── NAV ── -->
  <nav>
    <div class="max-w-6xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
      <button onclick="showHome()" class="flex items-center gap-2 group">

  <div id="search-overlay" onclick="closeSearchOutside(event)">

<script>
// ── State ──
let algorithms = [];
let currentView = 'home';
let showingAll = false;
const PREVIEW_COUNT = 12;

// ── Embedded fallback data (works without server) ──
const FALLBACK_ALGORITHMS = [
  { id:"binary-search",    name:"Binary Search",      hint:"Efficient O(log n) searching in sorted arrays",     time:"O(log n)", space:"O(1)",    tags:["search","divide-conquer"],
    files:{ python:"algorithms/binary-search/binary.py", cpp:"algorithms/binary-search/binary.cpp" },
    readme:"# Binary Search\n\nBinary Search is a divide-and-conquer algorithm that finds the position of a target value within a **sorted array**.\n\n## How it works\n\n1. Start with the middle element\n2. If target == middle → found!\n3. If target < middle → search left half\n4. If target > middle → search right half\n5. Repeat until found or range is empty\n\n## When to use\n\n- Array must be **sorted**\n- Large datasets where linear search is too slow\n\n> Binary search is one of the most fundamental algorithms every developer should master.",
    code:{ python:`def binary_search(arr, target):\n    left, right = 0, len(arr) - 1\n    while left <= right:\n        mid = (left + right) // 2\n        if arr[mid] == target:\n            return mid\n        elif arr[mid] < target:\n            left = mid + 1\n        else:\n            right = mid - 1\n    return -1\n\n# Example usage\narr = [1, 3, 5, 7, 9, 11, 13]\nprint(binary_search(arr, 7))  # Output: 3`,
      cpp:`#include <iostream>\n#include <vector>\nusing namespace std;\n\nint binarySearch(vector<int>& arr, int target) {\n    int left = 0, right = arr.size() - 1;\n    while (left <= right) {\n        int mid = left + (right - left) / 2;\n        if (arr[mid] == target) return mid;\n        else if (arr[mid] < target) left = mid + 1;\n        else right = mid - 1;\n    }\n    return -1;\n}\n\nint main() {\n    vector<int> arr = {1, 3, 5, 7, 9, 11, 13};\n    cout << binarySearch(arr, 7) << endl; // 3\n    return 0;\n}` }
  },
  { id:"bubble-sort",      name:"Bubble Sort",        hint:"Simple comparison-based sorting algorithm",          time:"O(n²)",    space:"O(1)",    tags:["sort"],
    files:{ python:"algorithms/bubble-sort/bubble.py", cpp:"algorithms/bubble-sort/bubble.cpp" },
    readme:"# Bubble Sort\n\nBubble Sort repeatedly steps through the list, **compares adjacent elements** and swaps them if they're in the wrong order.\n\n## How it works\n\n1. Compare adjacent elements\n2. Swap if out of order\n3. Repeat until no swaps needed\n\n## Characteristics\n\n- **Stable** sort\n- Best case O(n) when already sorted\n- Rarely used in practice — mainly educational",
    code:{ python:`def bubble_sort(arr):\n    n = len(arr)\n    for i in range(n):\n        swapped = False\n        for j in range(0, n - i - 1):\n            if arr[j] > arr[j + 1]:\n                arr[j], arr[j + 1] = arr[j + 1], arr[j]\n                swapped = True\n        if not swapped:\n            break\n    return arr\n\nprint(bubble_sort([64, 34, 25, 12, 22, 11, 90]))`,
      cpp:`#include <iostream>\n#include <vector>\nusing namespace std;\n\nvoid bubbleSort(vector<int>& arr) {\n    int n = arr.size();\n    for (int i = 0; i < n - 1; i++) {\n        bool swapped = false;\n        for (int j = 0; j < n - i - 1; j++) {\n            if (arr[j] > arr[j + 1]) {\n                swap(arr[j], arr[j + 1]);\n                swapped = true;\n            }\n        }\n        if (!swapped) break;\n    }\n}` }
  },
  { id:"quick-sort",       name:"Quick Sort",         hint:"Fast divide-and-conquer sorting with pivot",         time:"O(n log n)", space:"O(log n)", tags:["sort","divide-conquer"],
    files:{ python:"algorithms/quick-sort/quick.py", cpp:"algorithms/quick-sort/quick.cpp" },
    readme:"# Quick Sort\n\nQuick Sort is an efficient, in-place sorting algorithm that uses a **pivot** to partition the array.\n\n## Steps\n\n1. Choose a pivot element\n2. Partition: elements less than pivot go left, greater go right\n3. Recursively sort sub-arrays\n\n## Why it's fast\n\n- Average case O(n log n)\n- Cache-friendly\n- In-place (no extra memory)\n\n> Used in most standard library sort implementations.",
    code:{ python:`def quick_sort(arr):\n    if len(arr) <= 1:\n        return arr\n    pivot = arr[len(arr) // 2]\n    left   = [x for x in arr if x < pivot]\n    middle = [x for x in arr if x == pivot]\n    right  = [x for x in arr if x > pivot]\n    return quick_sort(left) + middle + quick_sort(right)\n\nprint(quick_sort([3,6,8,10,1,2,1]))`,
      cpp:`#include <iostream>\n#include <vector>\nusing namespace std;\n\nint partition(vector<int>& arr, int low, int high) {\n    int pivot = arr[high];\n    int i = low - 1;\n    for (int j = low; j < high; j++) {\n        if (arr[j] <= pivot) swap(arr[++i], arr[j]);\n    }\n    swap(arr[i + 1], arr[high]);\n    return i + 1;\n}\n\nvoid quickSort(vector<int>& arr, int low, int high) {\n    if (low < high) {\n        int pi = partition(arr, low, high);\n        quickSort(arr, low, pi - 1);\n        quickSort(arr, pi + 1, high);\n    }\n}` }
  },
  { id:"merge-sort",       name:"Merge Sort",         hint:"Stable divide-and-conquer O(n log n) sorting",       time:"O(n log n)", space:"O(n)",    tags:["sort","divide-conquer"],
    files:{ python:"algorithms/merge-sort/merge.py" },
    readme:"# Merge Sort\n\nMerge Sort is a **stable**, divide-and-conquer algorithm that divides, sorts, and merges.\n\n## Steps\n1. Divide array in half\n2. Recursively sort each half\n3. Merge the sorted halves\n\n## Strengths\n- Guaranteed O(n log n)\n- Stable sort\n- Great for linked lists",
    code:{ python:`def merge_sort(arr):\n    if len(arr) <= 1:\n        return arr\n    mid = len(arr) // 2\n    left  = merge_sort(arr[:mid])\n    right = merge_sort(arr[mid:])\n    return merge(left, right)\n\ndef merge(left, right):\n    result = []\n    i = j = 0\n    while i < len(left) and j < len(right):\n        if left[i] <= right[j]:\n            result.append(left[i]); i += 1\n        else:\n            result.append(right[j]); j += 1\n    result.extend(left[i:])\n    result.extend(right[j:])\n    return result\n\nprint(merge_sort([38, 27, 43, 3, 9, 82, 10]))` }
  },
  { id:"linear-search",    name:"Linear Search",      hint:"Simple sequential scan through a collection",        time:"O(n)",     space:"O(1)",    tags:["search"],
    files:{ python:"algorithms/linear-search/linear.py" },
    readme:"# Linear Search\n\nLinear Search scans each element **one by one** until the target is found.\n\n## When to use\n- Unsorted data\n- Small datasets\n- One-time searches\n\n## Limitation\nSlower than Binary Search for large, sorted datasets.",
    code:{ python:`def linear_search(arr, target):\n    for i, val in enumerate(arr):\n        if val == target:\n            return i\n    return -1\n\nprint(linear_search([4, 2, 7, 1, 9], 7))  # 2` }
  },
  { id:"insertion-sort",   name:"Insertion Sort",     hint:"Build sorted array one element at a time",           time:"O(n²)",    space:"O(1)",    tags:["sort"],
    files:{ python:"algorithms/insertion-sort/insertion.py" },
    readme:"# Insertion Sort\n\nBuilds the sorted list **one item at a time** by inserting each element into its correct position.\n\n## Best use cases\n- Nearly sorted data → approaches O(n)\n- Small datasets\n- Online algorithms (data arrives one at a time)",
    code:{ python:`def insertion_sort(arr):\n    for i in range(1, len(arr)):\n        key = arr[i]\n        j = i - 1\n        while j >= 0 and arr[j] > key:\n            arr[j + 1] = arr[j]\n            j -= 1\n        arr[j + 1] = key\n    return arr\n\nprint(insertion_sort([12, 11, 13, 5, 6]))` }
  },

    readme:"# Selection Sort\n\nFinds the **minimum element** from the unsorted portion and moves it to the front.\n\n## Pros & Cons\n- Simple to understand\n- Makes the minimum number of swaps (O(n))\n- Not stable, not efficient for large data",
    code:{ python:`def selection_sort(arr):\n    n = len(arr)\n    for i in range(n):\n        min_idx = i\n        for j in range(i + 1, n):\n            if arr[j] < arr[min_idx]:\n                min_idx = j\n        arr[i], arr[min_idx] = arr[min_idx], arr[i]\n    return arr\n\nprint(selection_sort([64, 25, 12, 22, 11]))` }

    readme:"# Depth-First Search (DFS)\n\nDFS explores a graph by going as **deep as possible** before backtracking.\n\n## Applications\n- Topological sorting\n- Detecting cycles\n- Solving mazes\n- Connected components\n\n## Variants\n- Recursive (call stack)\n- Iterative (explicit stack)",

    readme:"# Breadth-First Search (BFS)\n\nBFS explores all nodes at the **current depth** before moving to the next level.\n\n## Applications\n- Shortest path in unweighted graphs\n- Level-order tree traversal\n- Web crawlers\n- Social network connections",
    code:{ python:`from collections import deque\n\ndef bfs(graph, start):\n    visited = set([start])\n    queue   = deque([start])\n    while queue:\n        node = queue.popleft()\n        print(node, end=' ')\n        for neighbor in graph[node]:\n            if neighbor not in visited:\n                visited.add(neighbor)\n                queue.append(neighbor)\n\ngraph = {0:[1,2], 1:[2], 2:[0,3], 3:[]}\nbfs(graph, 0)  # 0 1 2 3` }

    code:{ python:`import heapq\n\ndef dijkstra(graph, start):\n    dist = {node: float('inf') for node in graph}\n    dist[start] = 0\n    pq = [(0, start)]\n    while pq:\n        d, u = heapq.heappop(pq)\n        if d > dist[u]: continue\n        for v, w in graph[u]:\n            if dist[u] + w < dist[v]:\n                dist[v] = dist[u] + w\n                heapq.heappush(pq, (dist[v], v))\n    return dist\n\ngraph = {'A':[('B',1),('C',4)], 'B':[('C',2),('D',5)], 'C':[('D',1)], 'D':[]}\nprint(dijkstra(graph, 'A'))` }

    code:{ python:`def two_sum(nums, target):\n    seen = {}\n    for i, num in enumerate(nums):\n        complement = target - num\n        if complement in seen:\n            return [seen[complement], i]\n        seen[num] = i\n    return []\n\nprint(two_sum([2, 7, 11, 15], 9))  # [0, 1]\nprint(two_sum([3, 2, 4], 6))       # [1, 2]` }

    code:{ python:`class Stack:\n    def __init__(self):\n        self._data = []\n\n    def push(self, x):\n        self._data.append(x)\n\n    def pop(self):\n        if self.is_empty():\n            raise IndexError("pop from empty stack")\n        return self._data.pop()\n\n    def peek(self):\n        return self._data[-1] if self._data else None\n\n    def is_empty(self):\n        return len(self._data) == 0\n\n    def __len__(self):\n        return len(self._data)\n\ns = Stack()\ns.push(1); s.push(2); s.push(3)\nprint(s.pop())   # 3\nprint(s.peek())  # 2` }

window.addEventListener('DOMContentLoaded', async () => {
  algorithms = FALLBACK_ALGORITHMS;
  // Try to load from algorithms.json
  try {
    const res = await fetch('./algorithms.json');
    if (res.ok) {
      const data = await res.json();
      if (Array.isArray(data) && data.length) algorithms = data;
    }
  } catch(_) {}
  showHome();
  setupSearch();
});

// ── Keyboard shortcut ──
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
  if (e.key === 'Escape') closeSearch();
});

// ── Search ──
function setupSearch() {
  const inp = document.getElementById('search-input');
  inp.addEventListener('input', () => renderSearchResults(inp.value.trim()));
}

function openSearch() {
  document.getElementById('search-overlay').classList.add('open');
  setTimeout(() => document.getElementById('search-input').focus(), 50);
  renderSearchResults('');
}

function closeSearch() {
  document.getElementById('search-overlay').classList.remove('open');
  document.getElementById('search-input').value = '';
}

function closeSearchOutside(e) {
  if (e.target === document.getElementById('search-overlay')) closeSearch();
}

function renderSearchResults(query) {
  const box = document.getElementById('search-results');
  const filtered = query
    ? algorithms.filter(a => a.name.toLowerCase().includes(query.toLowerCase()) || (a.tags||[]).some(t=>t.includes(query.toLowerCase())))
    : algorithms.slice(0, 12);

  if (!filtered.length) {
    box.innerHTML = `<p class="text-center py-8 text-sm" style="color:var(--txt-muted)">No algorithms found for "${query}"</p>`;
    return;
  }

  box.innerHTML = filtered.map(a => `
    <div class="search-result-item" onclick="showDetail('${a.id}'); closeSearch()">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0" style="background:rgba(0,229,195,0.08);border:1px solid rgba(0,229,195,0.15)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium truncate">${a.name}</p>
        <p class="text-xs mt-0.5 truncate" style="color:var(--txt-muted)">${a.hint}</p>
      </div>
      <span class="font-mono text-xs shrink-0" style="color:var(--txt-muted)">${a.time}</span>
    </div>
  `).join('');
}

function switchLang(lang) {

  const langMap = { python:'python', cpp:'cpp', java:'java', c:'c', js:'javascript' };
  const prismLang = langMap[lang] || lang;

  document.querySelectorAll('.lang-tab').forEach(t => {
    t.classList.toggle('active', t.textContent.trim() === lang);

  const container = document.getElementById('code-container');
  container.innerHTML = `<pre class="language-${prismLang}"><code class="language-${prismLang}">${escapeHtml(store[lang]||'# No code available')}</code></pre>`;

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
