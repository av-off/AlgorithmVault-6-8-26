<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Algorithm Vault</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>

<script>
 tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['Inter'],
        display: ['Space Grotesk']
      },
      colors: { dark: '#050505' }
    }
  }
 }
</script>

<style>
body { background:#050505 }
.glass {background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border:1px solid rgba(255,255,255,0.06)}
.fade {animation:fade .6s ease}
@keyframes fade {from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
</style>
</head>

<body class="text-white font-sans">

<header class="fixed top-0 w-full z-50 glass">
<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
<h1 class="font-display font-bold text-xl">Algorithm Vault</h1>
<input id="search" placeholder="Search algorithm..." class="bg-white/5 px-4 py-2 rounded-xl text-sm outline-none border border-white/10 w-56">
</div>
</header>

<main class="max-w-7xl mx-auto px-6 pt-28 pb-20">

<!-- HERO SECTION -->
<section class="min-h-[70vh] flex flex-col justify-center items-center text-center mb-20">
  <h1 class="text-5xl md:text-7xl font-display font-black tracking-tight leading-[0.9] mb-6">
    Build. Learn. Master <br>
    <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-blue-400 to-emerald-400">
      Algorithms.
    </span>
  </h1>

  <p class="text-gray-400 max-w-2xl text-lg mb-10">
    A clean collection of data structures and algorithms in multiple languages.
    Explore, copy, and level up your problem solving.
  </p>

  <div class="flex gap-4 flex-wrap justify-center">
    <a href="#grid" class="px-8 py-4 bg-gradient-to-r from-purple-600 to-blue-600 rounded-2xl text-sm font-bold uppercase tracking-wider hover:scale-105 transition-all">
      Explore Algorithms
    </a>
    <button onclick="document.getElementById('search').focus()" class="px-8 py-4 bg-white/5 rounded-2xl text-sm font-bold uppercase tracking-wider border border-white/10 hover:bg-white/10 transition-all">
      Search Now
    </button>
  </div>
</section>

<div id="grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

</main>

<script>

let algorithms = [];
let current = [];

async function loadAlgorithms() {
  const res = await fetch("algorithms.json");
  algorithms = await res.json();
  current = algorithms;
  render();
}

loadAlgorithms();

let current = algorithms;
const grid = document.getElementById("grid");

// SAFE FETCH (FIXES ERROR)
async function loadCode(path){
 try {
   const res = await fetch(path);
   if(!res.ok) throw new Error("File not found");
   return await res.text();
 } catch(err){
   return `// ⚠️ Failed to load file\n// Path: ${path}\n// Fix: run using localhost (not file://) OR check file path`;
 }
}

function cardTemplate(algo){
 const safeId = algo.name.replace(/\s+/g,'-');
 return `
 <div class="glass p-6 rounded-3xl fade">
   <div class="flex justify-between items-center mb-4">
     <h2 class="font-bold text-lg">${algo.name}</h2>
     <select onchange="changeLang(this,'${safeId}')" class="bg-black border border-white/10 text-xs px-2 py-1 rounded">
       ${Object.keys(algo.files).map(l=>`<option value="${l}">${l}</option>`).join("")}
     </select>
   </div>
   <pre class="text-sm overflow-auto max-h-80 rounded-xl"><code id="code-${safeId}" class="language-python"></code></pre>
   <button onclick="copyCode('${safeId}')" class="mt-4 text-xs px-3 py-2 bg-white text-black rounded-lg">Copy</button>
 </div>`;
}

async function render(){
 grid.innerHTML="";

 for(let algo of current){
   grid.innerHTML += cardTemplate(algo);
 }

 for(let algo of current){
   const safeId = algo.name.replace(/\s+/g,'-');
   const firstLang = Object.keys(algo.files)[0];
   const code = await loadCode(algo.files[firstLang]);
   const el = document.getElementById(`code-${safeId}`);
   el.textContent = code;
   el.className = `language-${firstLang}`;
 }

 Prism.highlightAll();
}

async function changeLang(select,id){
 const algo = algorithms.find(a=>a.name.replace(/\s+/g,'-')===id);
 const code = await loadCode(algo.files[select.value]);
 const el = document.getElementById(`code-${id}`);
 el.textContent = code;
 el.className = `language-${select.value}`;
 Prism.highlightElement(el);
}

function copyCode(id){
 const code = document.getElementById(`code-${id}`).textContent;
 navigator.clipboard.writeText(code);
}

// SEARCH

document.getElementById("search").addEventListener("input",e=>{
 const val = e.target.value.toLowerCase();
 current = algorithms.filter(a=>a.name.toLowerCase().includes(val));
 render();
});

render();
lucide.createIcons();

</script>

</body>
</html>
