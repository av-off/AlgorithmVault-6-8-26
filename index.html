<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Primary Meta Tags -->
  <meta name="title" content="Algorithm Vault">
  <meta name="author" content="Sakib">

  <!-- Open Graph / Facebook / LinkedIn -->

  <meta property="og:title" content="Algorithm Vault">
  <meta property="og:description" content="A comprehensive collection of algorithms and data structures implemented for efficiency and clarity.">
  <meta property="og:image" content="https://algorithm-vault.vercel.app/page_icon.png">

  <!-- Twitter -->

  <meta property="twitter:description" content="Built by Sakib. Explore interactive algorithm visualizations.">

  <!-- Site Name Schema (Helps Google show the name in search results) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Algorithm Vault",
    "url": "https://algorithm-vault.vercel.app"
  }
  </script>

  <title>Algorithm Vault</title>
  <meta name="description" content="A comprehensive collection of algorithms and data structures implemented for efficiency and clarity. Built by Sakib.">
  <link rel="icon" type="image/png" href="./page_icon.png">
  <link rel="shortcut icon" href="./page_icon.png">
  <link rel="apple-touch-icon" href="./page_icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;500;600;700;800&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">

  <!-- NAV -->
  <nav>
    <div class="max-w-6xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
  
      <button onclick="showHome()" class="flex items-center gap-2 group">
        <div class="w-7 h-7 rounded-lg flex items-center justify-center"
          style="background:linear-gradient(135deg,#00e5c3,#6c63ff)">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="1" y="1" width="5" height="5" rx="1.2" fill="white" opacity="0.9"/>
            <rect x="8" y="1" width="5" height="5" rx="1.2" fill="white" opacity="0.6"/>
            <rect x="1" y="8" width="5" height="5" rx="1.2" fill="white" opacity="0.6"/>
            <rect x="8" y="8" width="5" height="5" rx="1.2" fill="white" opacity="0.9"/>
          </svg>
        </div>
  
        <span class="font-display font-700 text-sm tracking-wide text-white">
          Algorithm<span style="color:var(--accent)">Vault</span>
        </span>
      </button>
  
      <div class="flex items-center gap-3">
  
        <button onclick="handleBookmarksNav()"
  class="btn-ghost text-sm py-2 px-3 flex items-center gap-2">

  <svg width="14" height="14" viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2">
    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
  </svg>

  <span class="hidden sm:inline">Bookmarks</span>
</button>

<button onclick="showHistory()"
  class="btn-ghost text-sm py-2 px-3 flex items-center gap-2">

  <svg width="14" height="14" viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2">
    <path d="M3 12a9 9 0 1 0 3-6.7"/>
    <path d="M3 3v6h6"/>
    <path d="M12 7v5l4 2"/>
  </svg>

  <span class="hidden sm:inline">History</span>
</button>
        <button onclick="openSearch()"
          class="flex items-center gap-2 btn-ghost text-sm py-2 px-3">
  
          <svg width="14" height="14" viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.3-4.3"/>
          </svg>
  
          <span class="hidden sm:inline">Search</span>
        </button>
         <a href="https://youtube.com/playlist?list=PL_wH6Y0h8SQ2yfnGytOAcQ3Jjyxfc-gXG&si=OgIrs2Mx9hjVUzHa"
   target="_blank"
   class="btn-ghost text-sm py-2 px-3 flex items-center gap-2">

  <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
    <path d="M23.498 6.186a2.997 2.997 0 00-2.11-2.12C19.505 3.5 12 3.5 12 3.5s-7.505 0-9.388.566a2.997 2.997 0 00-2.11 2.12C0 8.07 0 12 0 12s0 3.93.502 5.814a2.997 2.997 0 002.11 2.12C4.495 20.5 12 20.5 12 20.5s7.505 0 9.388-.566a2.997 2.997 0 002.11-2.12C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.75 15.568V8.432L15.818 12 9.75 15.568z"/>
  </svg>

  <span class="hidden sm:inline">YouTube</span>
</a>
        <a href="https://github.com/sakib-12345/AlgorithmVault"
          target="_blank"
          class="btn-ghost text-sm py-2 px-3 hidden sm:flex items-center gap-2">
  
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.014-1.703-2.782.604-3.369-1.341-3.369-1.341-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.741 0 .267.18.578.688.48C19.138 20.161 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
          </svg>
          GitHub
        </a>
  
      </div>
    </div>
  </nav>
  <div id="site-gh-notice" style="
    width:100%;
    background:#2d1b00;
    border-bottom:1px solid #f59e0b44;
    padding:10px 16px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    font-size:13px;
    color:#fcd34d;
    font-family:'Figtree',sans-serif;
    position:relative;
    z-index:49;
  ">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" style="flex-shrink:0"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <span><strong>Algorithm Vault is not fully ready yet.</strong> More algorithms coming soon — explore what's available.</span>
    <button onclick="this.parentElement.remove()" style="
      position:absolute;right:12px;
      background:transparent;border:none;
      color:#f59e0b;cursor:pointer;font-size:16px;
      padding:2px 6px;border-radius:4px;
      opacity:0.7;
    ">x</button>
  </div>

  <!-- SEARCH MODAL -->
  <div id="search-overlay" onclick="closeSearchOutside(event)">
    <div id="search-modal">
      <div class="px-4 py-3" style="border-bottom:1px solid var(--border)">
        <div class="flex items-center gap-3 mb-3">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--txt-muted)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="search-input" type="text" placeholder="Search algorithms..." autocomplete="off" class="flex-1 bg-transparent outline-none text-sm" />
          <button onclick="closeSearch()" class="text-xs"><kbd>ESC</kbd></button>
        </div>
        <div class="flex gap-2 flex-wrap">
          <select id="filter-lang" class="btn-ghost text-xs flex-1 min-w-[120px]">
            <option value="">All Languages ▼</option>
            <option value="python">Python</option>
            <option value="cpp">C++</option>
            <option value="java">Java</option>
            <option value="c">C</option>
          </select>
          <select id="filter-diff" class="btn-ghost text-xs flex-1 min-w-[120px]">
            <option value="">All Difficulty ▼</option>
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
          <select id="filter-tag" class="btn-ghost text-xs flex-1 min-w-[120px]">
            <option value="">All Topics ▼</option>
           <option value="array">Array</option>
<option value="backtracking">Backtracking</option>
<option value="data-structure">Data Structure</option>
<option value="divide-conquer">Divide & Conquer</option>
<option value="dp">Dynamic Programming</option>
<option value="flow">Flow</option>
<option value="geometry">Geometry</option>
<option value="graph">Graph</option>
<option value="greedy">Greedy</option>
<option value="heap">Heap</option>
<option value="linked-list">Linked List</option>
<option value="math">Math</option>
<option value="optimization">Optimization</option>
<option value="randomized">Randomized</option>
<option value="recursion">Recursion</option>
<option value="search">Search</option>
<option value="shortest-path">Shortest Path</option>
<option value="sort">Sort</option>
<option value="string">String</option>
<option value="traversal">Traversal</option>
<option value="tree">Tree</option>
          </select>
          
        </div>
      </div>
      <div id="search-results" class="max-h-[400px] overflow-y-auto">
        <p class="text-center py-8 text-sm" style="color:var(--txt-muted)">Type to search algorithms</p>
      </div>
    </div>
  </div>

  <main id="main"></main>

  <div id="toast" style="
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,229,195,0.12);
    border: 1px solid rgba(0,229,195,0.3);
    color: #00e5c3;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 12px;
    opacity: 0;
    pointer-events: none;
    transition: 0.25s ease;
  ">Copied to clipboard</div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

     

<script src="script.js"></script>
</body>
</html>
